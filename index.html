<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Fortune - 오늘의 미식 운세</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="logo">Vibe Fortune</h1>
        </header>

        <nav class="category-nav">
            <div class="filters">
                <button class="filter-btn active" data-category="all">전체</button>
                <button class="filter-btn" data-category="korean">한식</button>
                <button class="filter-btn" data-category="western">양식</button>
                <button class="filter-btn" data-category="japanese">일식</button>
                <button class="filter-btn" data-category="chinese">중식</button>
                <button class="filter-btn" data-category="simple">간단</button>
            </div>
        </nav>

        <main class="app-main">
            <div id="result-card" class="insta-card hidden">
                <div class="card-header">
                    <div class="profile-pic">✨</div>
                    <span class="username">cosmic_fortune</span>
                </div>
                
                <div class="card-image-container">
                    <div id="loading-overlay" class="loading-overlay">
                        <div class="spinner"></div>
                        <p>우주에서 미식을 가져오는 중...</p>
                    </div>
                    <img id="menu-image" src="" alt="추천 메뉴" class="menu-image">
                </div>

                <div class="card-body">
                    <div class="card-actions">
                        <span class="badge" id="res-category">KOREAN</span>
                    </div>
                    <p class="caption">
                        <span class="bold">cosmic_fortune</span> 
                        <span id="res-name">메뉴 이름</span>
                    </p>
                    <div id="res-description" class="description-box"></div>
                </div>
            </div>

            <div class="action-area">
                <button id="recommend-btn" class="main-cta">나의 미식 운세 확인하기</button>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-links">
                <button onclick="openModal('privacy')">개인정보처리방침</button>
                <button onclick="openModal('terms')">이용약관</button>
            </div>
            <p class="copyright">© 2026 Vibe Fortune</p>
        </footer>
    </div>

    <!-- 모달 창 -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title"></h2>
            <div id="modal-body" class="modal-body"></div>
            <button class="modal-close" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
