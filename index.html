<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 미식 운세</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 초기 화면 -->
        <div id="intro-view" class="view-content">
            <h1>오늘의 미식 운세</h1>
            <p>당신을 위한 완벽한 메뉴를 추천해드립니다.</p>
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">전체</button>
                <button class="filter-btn" data-category="korean">한식</button>
                <button class="filter-btn" data-category="western">양식</button>
                <button class="filter-btn" data-category="japanese">일식</button>
                <button class="filter-btn" data-category="chinese">중식</button>
            </div>
            <button id="recommend-btn" class="main-cta">추천 받기</button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-view" class="view-content hidden">
            <div class="result-header">
                <span id="res-category" class="category-badge">CATEGORY</span>
                <h2 id="res-name">메뉴 이름</h2>
            </div>
            
            <div class="image-wrapper">
                <div id="loading-overlay">
                    <div class="spinner"></div>
                    <p>미식을 요리 중입니다...</p>
                </div>
                <img id="menu-image" src="" alt="추천 메뉴">
            </div>
            
            <p id="res-description">메뉴 설명</p>
            <button id="retry-btn" class="main-cta secondary">다시 추천 받기</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
