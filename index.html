<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? | 맞춤 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 초기 화면 -->
        <div id="intro-view" class="view-content">
            <h1 class="logo">오늘 뭐 먹지?</h1>
            <p class="subtitle">당신을 위한 오늘의 미식 가이드</p>
            <button id="recommend-btn" class="main-cta">추천 받기</button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-view" class="view-content hidden">
            <div class="insta-card">
                <div class="card-header">
                    <div class="profile-pic">CHEF</div>
                    <div class="header-text">
                        <span class="username">Daily_Menu_Bot</span>
                        <span class="location">당신의 주방</span>
                    </div>
                </div>
                
                <div class="image-container">
                    <div id="loading-overlay">
                        <div class="spinner"></div>
                        <p>메뉴를 준비 중입니다...</p>
                    </div>
                    <img id="menu-image" src="" alt="추천 메뉴">
                </div>

                <div class="card-body">
                    <div class="action-icons">
                        <span>❤️</span> <span>💬</span> <span>✈️</span>
                    </div>
                    <div class="caption">
                        <span class="bold" id="res-name">메뉴 이름</span>
                        <span id="res-desc">메뉴 설명이 표시됩니다.</span>
                    </div>
                </div>
            </div>
            <button id="retry-btn" class="main-cta secondary">다시 추천 받기</button>
        </div>

        <footer class="app-footer">
            <a href="privacy.html" class="privacy-link">개인정보처리방침</a>
            <p class="copyright">© 2026 Gourmet Guide</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
