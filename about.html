<html lang="ko">
<head>

    <title>서비스 소개 - 오늘의 미식 운세</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow-y: auto; align-items: flex-start; padding: 40px 20px; }
        .content-page { background: white; padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--primary-color); margin-bottom: 20px; font-size: 24px; }
        p { line-height: 1.8; margin-bottom: 15px; color: #444; }
        .back-btn { display: inline-block; margin-top: 20px; color: var(--primary-color); text-decoration: none; font-weight: 600; }
    </style>

<body>
    <div class="content-page">
        <h1>서비스 소개</h1>
        <p>안녕하세요! '오늘의 미식 운세'는 매일 반복되는 "오늘 뭐 먹지?"라는 고민을 즐겁고 신비로운 경험으로 바꿔드리기 위해 탄생했습니다.</p>
